<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>차량 이미지 제작 대시보드 v6</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>차량 이미지 제작 대시보드</h1>
      <p class="sub">차량/유종/트림을 고르면 선택 가능한 옵션이 자동으로 바뀝니다.</p>

      <label>
        <span>기준일자</span>
        <input type="date" id="dateInput" />
      </label>

      <label>
        <span>차량명</span>
        <select id="carSelect"></select>
      </label>

      <div class="grid2">
        <label>
          <span>엔진</span>
          <select id="fuelSelect"></select>
        </label>
        <label>
          <span>트림</span>
          <select id="trimSelect"></select>
        </label>
      </div>

      <label>
        <span>차량색상</span>
        <select id="colorSelect"></select>
      </label>

      <div class="grid2">
        <label>
          <span>약정기간</span>
          <input type="text" id="periodInput" value="48개월" />
        </label>
        <label>
          <span>차량가격</span>
          <input type="text" id="priceInput" />
        </label>
      </div>

      <div class="grid2">
        <label>
          <span>만기인수가</span>
          <input type="text" id="residualInput" value="17,750,000원" />
        </label>
        <label>
          <span>보증금</span>
          <input type="text" id="depositInput" value="1,000,000원" />
        </label>
      </div>

      <label>
        <span id="rentInputLabel">월렌트료</span>
        <input type="text" id="rentInput" value="675,000원" />
      </label>

      <div class="option-head">
        <strong>옵션 선택</strong>
      </div>

      <div id="optionInputList" class="option-input-list"></div>
      <button type="button" class="add-option-btn" id="addOptionBtn">+ 옵션 추가</button>

      <button type="button" class="primary-btn" id="downloadBtn">PNG 다운로드</button>
      <p class="hint">옵션 사진은 <b>images/options</b> 폴더와 <b>data.js</b>의 image 경로로 관리합니다.</p>
    </aside>

    <main class="preview-wrap">
      <div class="preview-scale">
        <div id="poster" class="poster">
          <div class="hero">
            <div class="date" id="previewDate"></div>
            <div class="title" id="previewCarName"></div>
            <div class="trim-pill" id="previewTrim"></div>
            <img class="car-image" id="previewCarImage" alt="차량 이미지" />
          </div>

          <div class="price-box">
            <div class="spec-grid">
              <div class="spec-item">
                <span class="dot"></span><strong>약정기간</strong><span class="spec-value" id="previewPeriod"></span>
              </div>
              <div class="spec-item">
                <span class="dot"></span><strong>차량가격</strong><span class="spec-value" id="previewPrice"></span>
              </div>
              <div class="spec-item">
                <span class="dot"></span><strong>만기인수가</strong><span class="spec-value" id="previewResidual"></span>
              </div>
              <div class="spec-item blank"></div>
            </div>
            <div class="rent-strip">
              <div class="rent-item"><strong>보증금</strong><span id="previewDeposit" class="accent"></span></div>
              <div class="rent-item"><strong id="previewRentLabel">월렌트료</strong><span id="previewRent" class="accent"></span></div>
            </div>
          </div>

          <div class="section-title" id="optionsTitle"><span></span><h2>옵션</h2><span></span></div>

          <div class="options-area" id="optionsArea">
            <div class="option-card" id="optionCard1">
              <img class="option-thumb-img" id="optImg1" alt="" />
              <div class="option-copy"><h3 id="optTitle1"></h3><p id="optDesc1"></p></div>
            </div>
            <div class="option-card" id="optionCard2">
              <img class="option-thumb-img" id="optImg2" alt="" />
              <div class="option-copy"><h3 id="optTitle2"></h3><p id="optDesc2"></p></div>
            </div>
            <div class="option-card" id="optionCard3">
              <img class="option-thumb-img" id="optImg3" alt="" />
              <div class="option-copy"><h3 id="optTitle3"></h3><p id="optDesc3"></p></div>
            </div>
            <div class="option-card" id="optionCard4">
              <img class="option-thumb-img" id="optImg4" alt="" />
              <div class="option-copy"><h3 id="optTitle4"></h3><p id="optDesc4"></p></div>
            </div>
            <div class="option-card" id="optionCard5">
              <img class="option-thumb-img" id="optImg5" alt="" />
              <div class="option-copy"><h3 id="optTitle5"></h3><p id="optDesc5"></p></div>
            </div>
            <div class="option-card" id="optionCard6">
              <img class="option-thumb-img" id="optImg6" alt="" />
              <div class="option-copy"><h3 id="optTitle6"></h3><p id="optDesc6"></p></div>
            </div>
            <div class="option-card" id="optionCard7">
              <img class="option-thumb-img" id="optImg7" alt="" />
              <div class="option-copy"><h3 id="optTitle7"></h3><p id="optDesc7"></p></div>
            </div>
            <div class="option-card" id="optionCard8">
              <img class="option-thumb-img" id="optImg8" alt="" />
              <div class="option-copy"><h3 id="optTitle8"></h3><p id="optDesc8"></p></div>
            </div>
          </div>

          <div class="benefits">
            <div class="benefit">
              <div class="benefit-badge">혜택1</div>
              <div class="benefit-body">
                <img class="benefit-photo" src="images/benefits/benefit_blackbox.png" alt="블랙박스" />
                <div class="benefit-text">블랙박스<br />무상탑재!</div>
              </div>
            </div>
            <div class="benefit">
              <div class="benefit-badge">혜택2</div>
              <div class="benefit-body">
                <img class="benefit-photo" src="images/benefits/benefit_tinting.png" alt="측후면 썬팅" />
                <div class="benefit-text">측후면<br />썬팅제공!</div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="data.js"></script>
  <script src="genesis_data_addon.js"></script>
  <script src="script.js"></script>
</body>
</html>
